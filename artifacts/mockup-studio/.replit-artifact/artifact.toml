kind = "web"
previewPath = "/"
title = "Mockup Studio"
version = "1.0.0"
id = "artifacts/mockup-studio"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 25735

[services.development]
run = "pnpm --filter @workspace/mockup-studio run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/mockup-studio", "run", "build" ]
publicDir = "artifacts/mockup-studio/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "25735"
BASE_PATH = "/"
